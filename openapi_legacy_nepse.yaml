                  additionalProperties: true
  /api/nots/lives-market:
    get:
      summary: Live trades (market open)
      operationId: getLiveTrades
      responses:
        '200':
          description: Live trades
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
    post:
      summary: Live trades (market open) - dynamic payload
      operationId: getLiveTradesPost
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              description: Dynamic payload calculated from token (id). If omitted, client generates.
              additionalProperties: true
      responses:
        '200':
          description: Live trades
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
  /api/nots/graph/index/{indexId}:
    post:
      summary: Live index graph data
      operationId: getLiveIndexGraph
      parameters:
        - in: path
          name: indexId
          required: true
          schema: { type: integer }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              description: Dynamic payload calculated from token (id). If omitted, client generates.
              additionalProperties: true
      responses:
        '200':
          description: Live index graph data
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
  /api/nots/security:
    get:
      summary: Security details (generic)
      operationId: getSecurity
      responses:
        '200':
          description: Security data
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/nots/security/{securityId}:
    post:
      summary: Ticker info by security ID
      operationId: getTickerInfo
      parameters:
        - in: path
          name: securityId
          required: true
          schema: { type: integer }
      requestBody:
