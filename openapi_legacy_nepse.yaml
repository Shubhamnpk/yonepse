      operationId: getSupplyDemand
      parameters:
        - in: query
          name: all
          schema: { type: string, enum: ["true", "false"] }
          required: false
      responses:
        '200':
          description: Supply and demand list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
  /api/nots/top-ten/trade-qty:
    get:
      summary: Top trade by quantity
      operationId: getTopTradeByQuantity
      parameters:
        - in: query
