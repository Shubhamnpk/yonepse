              schema:
                type: object
                additionalProperties: true
  /api/nots/market/security/price/{securityId}:
    get:
      summary: Ticker price history
      operationId: getTickerPriceHistory
      parameters:
        - in: path
          name: securityId
          required: true
          schema: { type: integer }
        - in: query
          name: startDate
          schema: { type: string, format: date }
          required: true
        - in: query
          name: endDate
          schema: { type: string, format: date }
          required: true
        - in: query
          name: page
          schema: { type: integer }
          required: false
        - in: query
          name: size
          schema: { type: integer }
          required: false
      responses:
        '200':
          description: Price history list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
  /api/nots/nepse-index:
