          description: Top losers list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
  /api/nots/top-ten/turnover:
    get:
      summary: Top turnover
      operationId: getTopTurnover
      parameters:
        - in: query
          name: all
          schema: { type: string, enum: ["true", "false"] }
          required: false
      responses:
        '200':
          description: Top turnover list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
  /api/nots/top-ten/trade:
    get:
      summary: Top trade
      operationId: getTopTrade
      parameters:
        - in: query
          name: all
          schema: { type: string, enum: ["true", "false"] }
          required: false
      responses:
        '200':
          description: Top trade list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
  /api/nots/top-ten/transaction:
    get:
      summary: Top transaction
      operationId: getTopTransaction
      parameters:
        - in: query
          name: all
          schema: { type: string, enum: ["true", "false"] }
          required: false
      responses:
        '200':
          description: Top transaction list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
  /api/nots/market-summary:
    get:
      summary: Market summary
      operationId: getMarketSummary
      responses:
        '200':
          description: Market summary
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/nots/company/list:
    get:
      summary: List all companies/securities
      operationId: getCompanyList
      responses:
        '200':
          description: Company list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
  /api/nots/nepse-data/marcapbydate:
    get:
      summary: Market cap by date
      operationId: getMarketCap
      parameters:
        - in: query
          name: date
          schema: { type: string, format: date }
          required: false
      responses:
        '200':
          description: Market cap data
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
  /api/nots/nepse-data/trading-average:
    get:
      summary: Trading average
      operationId: getTradingAverage
      parameters:
        - in: query
          name: nDays
          schema: { type: integer }
          required: false
        - in: query
          name: businessDate
          schema: { type: string, format: date }
          required: false
        - in: query
          name: page
          schema: { type: string }
          required: false
        - in: query
          name: size
          schema: { type: string }
          required: false
      responses:
        '200':
          description: Trading average data
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/nots/member:
    post:
      summary: Broker list
      operationId: getBrokers
      parameters:
        - in: query
          name: page
          schema: { type: string }
          required: false
        - in: query
          name: size
          schema: { type: string }
          required: false
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Broker list
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/nots/sector:
    get:
      summary: Sector list
      operationId: getSectors
      responses:
        '200':
          description: Sector list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
  /api/nots/index:
    get:
      summary: Sector indices
      operationId: getSectorIndices
      responses:
        '200':
          description: Sector indices
          content:
            application/json:
              schema:
                type: array
