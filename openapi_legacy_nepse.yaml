openapi: 3.0.3
info:
  title: YONEPSE API
  version: 0.1.0
  description: |
    OpenAPI specification generated from YOnepse-scraper endpoint definitions.
    All endpoints are under https://www.nepalstock.com and require an Authorization
    header in the form: "Salter <token>". Some POST endpoints use a dynamic payload
    derived from the authentication token; see notes in each operation.
servers:
  - url: https://www.nepalstock.com
security:
  - SalterAuth: []
paths:
  /api/authenticate/prove:
    get:
      summary: Authenticate and retrieve token details
      operationId: authenticate
      security: []
      responses:
        '200':
          description: Token details
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/nots/nepse-data/today-price:
    post:
      summary: Get today's price data
      operationId: getTodayPrice
      parameters:
        - in: query
          name: page
          schema: { type: string }
          required: false
        - in: query
          name: size
          schema: { type: string }
          required: false
        - in: query
          name: businessDate
          schema: { type: string, format: date }
          required: false
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              description: Dynamic payload calculated from token (id). If omitted, client generates.
              additionalProperties: true
      responses:
        '200':
          description: Price list
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/nots/nepse-data/market-open:
    get:
      summary: Market open status
      operationId: getMarketOpen
      responses:
        '200':
          description: Market status
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /:
    get:
      summary: Refer API (empty path in source)
      operationId: referApi
      description: Placeholder for refer_api which is an empty path in endpoints.py
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/nots/index/history/{indexId}:
    get:
      summary: Index history by index ID
      operationId: getIndexHistory
      parameters:
        - in: path
          name: indexId
          required: true
          schema: { type: integer }
        - in: query
          name: startDate
          schema: { type: string, format: date }
          required: true
        - in: query
          name: endDate
          schema: { type: string, format: date }
          required: true
      responses:
        '200':
          description: Index history list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
  /api/nots/sectorwise:
    get:
      summary: Sector-wise summary
      operationId: getSectorwiseSummary
      responses:
        '200':
          description: Sector-wise summary
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
  /api/nots/market-summary-history:
    get:
      summary: Market summary history
      operationId: getMarketSummaryHistory
      responses:
        '200':
          description: Market summary history
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
  /api/nots/news/companies/disclosure:
    get:
      summary: Company disclosures
      operationId: getCompanyDisclosures
      responses:
        '200':
          description: Disclosures payload
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/nots/top-ten/top-gainer:
    get:
      summary: Top gainers
      operationId: getTopGainer
      parameters:
        - in: query
          name: all
          schema: { type: string, enum: ["true", "false"] }
          required: false
      responses:
        '200':
          description: Top gainers list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
  /api/nots/top-ten/top-loser:
    get:
      summary: Top losers
      operationId: getTopLoser
      parameters:
        - in: query
          name: all
          schema: { type: string, enum: ["true", "false"] }
